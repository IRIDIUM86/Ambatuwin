<!DOCTYPE html>
<html>
<head>
    <title>VHack Phase 1</title>
</head>
<body>
    <h1>F&B Connector Test</h1>
    
    <input type="text" id="name" placeholder="Machine Name (e.g. Oven)">
    <input type="number" id="temp" placeholder="Temperature">
    <button onclick="checkConnection()">Test Connector</button>

    <p id="display">Status: Waiting...</p>

    <script>
        async function checkConnection() {
            const name = document.getElementById('name').value;
            const temp = document.getElementById('temp').value;

            try {
                // THE BRIDGE: Sending data to your FastAPI
                const response = await fetch('http://127.0.0.1:8000/test-connection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        machine_name: name,
                        temperature: parseFloat(temp)
                    })
                });

                const result = await response.json();
                document.getElementById('display').innerText = 
                    `Response: ${result.message} (Temp: ${result.received_temp})`;
                
            } catch (error) {
                document.getElementById('display').innerText = "Error: Backend not found!";
            }
        }
    </script>
</body>
</html>
